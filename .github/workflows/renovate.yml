name: 'Renovate'

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request:
    types:
      - opened
      - reopened
      - edited

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure Renovate
        uses: renovatebot/github-action@v40
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/renovate.json
