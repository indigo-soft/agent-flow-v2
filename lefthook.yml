# Lefthook Configuration
# Docs: https://github.com/evilmartians/lefthook

# Colors
colors: true

# Pre-commit hook
pre-commit:
  parallel: false
  commands:
    # Lint staged files
    lint-staged:
      glob: "*.{js,jsx,ts,tsx,json,md,prisma,css,scss}"
      run: npx lint-staged

# Commit-msg hook
commit-msg:
  parallel: false
  commands:
    # Validate commit message format using commitlint
    commitlint:
      run: npx commitlint --edit {1}


# Pre-push hook (optional, можна використовувати для додаткових перевірок)
pre-push:
  parallel: false
  commands:
    # Type check
    typecheck:
      run: pnpm type-check

    # Run tests
    test:
      run: pnpm test --bail --findRelatedTests
      skip:
        - merge
        - rebase
